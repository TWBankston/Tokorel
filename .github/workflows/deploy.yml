name: Deploy to Hostinger

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Prepare server files
        run: |
          cp public/.htaccess out/.htaccess
          cp public/subscribe.php out/subscribe.php
          # Remove placeholder config and setup.sql so they don't overwrite
          # manually-uploaded credentials on Hostinger
          rm -f out/auth/config.php
          rm -f out/auth/setup.sql

      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy
          commit_message: "Deploy from ${{ github.sha }}"
